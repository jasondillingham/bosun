<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bosun</title>
<style>
  :root {
    --fg: #1f2328;
    --muted: #6b7280;
    --bg: #f7f7f8;
    --card: #ffffff;
    --border: #e5e7eb;
    --accent: #6366f1;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 1.25rem;
    color: var(--fg); background: var(--bg);
  }
  header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.75rem; }
  h1 { font-size: 1.15rem; margin: 0; }
  h2 { font-size: 0.95rem; margin: 1.5rem 0 0.5rem; }
  .muted { color: var(--muted); font-size: 0.85rem; }
  table {
    width: 100%; border-collapse: collapse;
    background: var(--card);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    border-radius: 6px; overflow: hidden;
  }
  th, td {
    padding: 0.5rem 0.7rem; text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
  }
  th { background: #f3f4f6; font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  tr.session-row { cursor: pointer; }
  tr.session-row:hover td { background: #f9fafb; }
  tr.session-row.selected td { background: #eef2ff; }
  /* Indent the SESSION column for sub-sessions. data-depth is the depth
     from /api/status; top-level sessions render flush as before. */
  tr.session-row td.session-cell { padding-left: calc(0.7rem + var(--depth, 0) * 1.2em); }
  tr.session-row td.session-cell .tree-prefix { color: var(--muted); margin-right: 0.25rem; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.last { color: var(--muted); }
  .state { font-weight: 600; }
  .state-DONE { color: #15803d; }
  .state-WORKING { color: #1d4ed8; }
  .state-STUCK { color: #b91c1c; }
  .state-EMPTY { color: var(--muted); font-weight: normal; }
  .events { display: flex; flex-direction: column; gap: 0.3rem; }
  .event {
    background: var(--card);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 0.45rem 0.7rem;
    font-size: 0.85rem;
    display: flex; gap: 0.5rem; align-items: baseline;
  }
  .event .ts { color: var(--muted); font-variant-numeric: tabular-nums; margin-left: auto; font-size: 0.78rem; }
  .event .session { color: #374151; font-weight: 500; }
  .event .kind { color: var(--accent); font-weight: 600; }
  .empty { color: var(--muted); font-style: italic; padding: 0.4rem 0; }

  .brief {
    background: var(--card);
    border-radius: 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    padding: 0.85rem 1rem;
    font-size: 0.85rem;
  }
  .brief .meta {
    display: flex; flex-wrap: wrap; gap: 0.5rem 1rem;
    color: var(--muted); margin-bottom: 0.6rem;
    font-size: 0.82rem;
  }
  .brief .meta strong { color: var(--fg); font-weight: 600; }
  .brief .paths {
    margin: 0.4rem 0; padding-left: 1.2rem;
    color: #374151;
  }
  .brief .paths li {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.8rem;
  }
  .brief pre {
    background: #f3f4f6;
    border-radius: 4px;
    padding: 0.6rem 0.8rem;
    overflow-x: auto;
    font-size: 0.78rem;
    margin: 0.5rem 0 0;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 24rem;
  }
</style>
</head>
<body>
<header>
  <h1>bosun</h1>
  <span class="muted" id="updated">connecting&hellip;</span>
</header>

<table>
  <thead><tr>
    <th>Session</th>
    <th>State</th>
    <th>Branch</th>
    <th class="num">Ahead</th>
    <th class="num">Dirty</th>
    <th class="num">Claimed</th>
    <th>Last commit</th>
  </tr></thead>
  <tbody id="rows"><tr><td colspan="7" class="empty">loading&hellip;</td></tr></tbody>
</table>

<h2>Brief preview</h2>
<div id="brief" class="brief"><div class="empty">click a session row to preview its brief</div></div>

<h2>Events</h2>
<div id="events" class="events"><div class="empty">no events yet</div></div>

<script>
  function escapeHTML(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function(c) {
      return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
    });
  }

  // selectedSession is the session label currently open in the brief
  // preview pane. We re-fetch it on every status refresh so claim counts
  // and state stay live without the operator clicking again.
  let selectedSession = null;

  // treeOrdered mirrors internal/status.TreeOrdered: emit each parent
  // followed immediately by its children. Sessions whose Parent isn't in
  // the input fall through to the orphan-pass at the bottom.
  function treeOrdered(sessions) {
    if (!sessions || sessions.length === 0) return sessions || [];
    const byName = new Map();
    const childrenOf = new Map();
    for (const s of sessions) {
      byName.set(s.name, s);
      if (s.parent) {
        if (!childrenOf.has(s.parent)) childrenOf.set(s.parent, []);
        childrenOf.get(s.parent).push(s.name);
      }
    }
    const emitted = new Set();
    const out = [];
    function emit(name) {
      if (emitted.has(name)) return;
      const s = byName.get(name);
      if (!s) return;
      emitted.add(name);
      out.push(s);
      for (const child of (childrenOf.get(name) || [])) emit(child);
    }
    for (const s of sessions) {
      if (!s.parent) emit(s.name);
    }
    for (const s of sessions) emit(s.name);
    return out;
  }

  async function refresh() {
    try {
      const r = await fetch("/api/status", { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      render(await r.json());
      document.getElementById("updated").textContent =
        "updated " + new Date().toLocaleTimeString();
      if (selectedSession) {
        loadBrief(selectedSession, /*silent*/ true);
      }
    } catch (e) {
      document.getElementById("updated").textContent = "error: " + e.message;
    }
  }

  function render(p) {
    const tbody = document.getElementById("rows");
    tbody.innerHTML = "";
    const sessions = treeOrdered((p && p.sessions) || []);
    if (sessions.length === 0) {
      const tr = document.createElement("tr");
      tr.innerHTML = '<td colspan="7" class="empty">no sessions</td>';
      tbody.appendChild(tr);
      return;
    }
    for (const s of sessions) {
      const tr = document.createElement("tr");
      tr.className = "session-row";
      if (s.name === selectedSession) tr.classList.add("selected");
      tr.dataset.session = s.name;
      const depth = Number(s.depth) || 0;
      if (depth > 0) tr.style.setProperty("--depth", depth);
      const treePrefix = depth > 0 ? '<span class="tree-prefix">└─</span>' : "";
      const last = s.last_subject
        ? `${escapeHTML(s.last_sha || "")} ${escapeHTML(s.last_subject)} <span class="muted">(${escapeHTML(s.last_relative || "")})</span>`
        : "";
      tr.innerHTML =
        `<td class="session-cell">${treePrefix}${escapeHTML(s.name)}</td>` +
        `<td class="state state-${escapeHTML(s.state)}">${escapeHTML(s.state)}</td>` +
        `<td>${escapeHTML(s.branch)}</td>` +
        `<td class="num">${Number(s.ahead) || 0}</td>` +
        `<td class="num">${Number(s.dirty) || 0}</td>` +
        `<td class="num">${Number(s.claimed) || 0}</td>` +
        `<td class="last">${last}</td>`;
      tr.addEventListener("click", () => {
        selectedSession = s.name;
        document.querySelectorAll("tr.session-row").forEach((el) => {
          el.classList.toggle("selected", el.dataset.session === s.name);
        });
        loadBrief(s.name, /*silent*/ false);
      });
      tbody.appendChild(tr);
    }
  }

  async function loadBrief(name, silent) {
    const box = document.getElementById("brief");
    if (!silent) {
      box.innerHTML = '<div class="empty">loading&hellip;</div>';
    }
    try {
      const r = await fetch("/api/show/" + encodeURIComponent(name), { cache: "no-store" });
      if (r.status === 404) {
        box.innerHTML = `<div class="empty">${escapeHTML(name)} not found</div>`;
        return;
      }
      if (!r.ok) throw new Error("HTTP " + r.status);
      renderBrief(await r.json());
    } catch (e) {
      box.innerHTML = `<div class="empty">error: ${escapeHTML(e.message)}</div>`;
    }
  }

  function renderBrief(d) {
    const box = document.getElementById("brief");
    const meta =
      `<span><strong>${escapeHTML(d.name || "")}</strong></span>` +
      `<span>state <strong class="state-${escapeHTML(d.state || "")}">${escapeHTML(d.state || "")}</strong></span>` +
      `<span>branch <strong>${escapeHTML(d.branch || "")}</strong></span>` +
      `<span>ahead <strong>${Number(d.ahead) || 0}</strong></span>` +
      `<span>dirty <strong>${Number(d.dirty) || 0}</strong></span>` +
      `<span>claimed <strong>${Number(d.claimed) || 0}</strong></span>`;
    const paths = (d.claimed_paths || []);
    const pathsHTML = paths.length
      ? `<ul class="paths">${paths.map((p) => `<li>${escapeHTML(p)}</li>`).join("")}</ul>`
      : "";
    const briefBody = d.brief
      ? `<pre>${escapeHTML(d.brief)}</pre>`
      : `<div class="empty">no BOSUN_BRIEF.md in worktree</div>`;
    box.innerHTML = `<div class="meta">${meta}</div>${pathsHTML}${briefBody}`;
  }

  const evtsBox = document.getElementById("events");
  let firstEvent = true;
  function appendEvent(e) {
    if (firstEvent) {
      evtsBox.innerHTML = "";
      firstEvent = false;
    }
    const ts = e.at ? new Date(e.at).toLocaleTimeString() : "";
    const div = document.createElement("div");
    div.className = "event";
    div.innerHTML =
      `<span class="session">${escapeHTML(e.session || "")}</span>` +
      `<span class="kind">[${escapeHTML(e.kind || "event")}]</span>` +
      `<span>${escapeHTML(e.message || "")}</span>` +
      `<span class="ts">${escapeHTML(ts)}</span>`;
    evtsBox.prepend(div);
    while (evtsBox.children.length > 50) evtsBox.removeChild(evtsBox.lastChild);
  }

  const es = new EventSource("/api/events");
  es.onmessage = (msg) => {
    try { appendEvent(JSON.parse(msg.data)); } catch (_) { /* ignore */ }
  };

  refresh();
  setInterval(refresh, 2000);
</script>
</body>
</html>
