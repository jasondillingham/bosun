name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Matrix: ubuntu + windows for every push. macOS is intentionally
    # off the default matrix — its 10× minute multiplier burns quota
    # fast and macOS-specific regressions are caught locally on the
    # maintainer's primary box. Public-repo Linux runners are free,
    # and Windows (2×) is the cost we pay for the platform claim in
    # README's "Supported platforms" — without this CI signal that
    # claim has no evidence.
    #
    # If macOS-specific CI becomes important later (external macOS
    # contributors, an Apple-Silicon-only bug surface), add it back:
    #   os: [ubuntu-latest, macos-latest, windows-latest]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: go vet
        run: go vet ./...

      - name: go build (POSIX)
        # Inject the git-derived version so `bosun --version` reports something
        # meaningful even on CI-built binaries. Mirrors `make build`. Falls
        # back to "dev" if git describe fails (shallow clones etc.).
        if: runner.os != 'Windows'
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          go build -ldflags="-X main.version=$VERSION" -o bosun ./cmd/bosun

      - name: go build (Windows)
        # PowerShell flavour of the same step — bash isn't the default
        # shell on windows-latest. Outputs bosun.exe to match the
        # convention. The test runner doesn't depend on the built binary
        # so this step is purely about confirming the build path stays
        # clean on Windows.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (git describe --tags --always --dirty 2>$null)
          if (-not $version) { $version = "dev" }
          go build -ldflags="-X main.version=$version" -o bosun.exe ./cmd/bosun

      - name: go test -race (POSIX)
        # Race detector requires cgo. Linux runners have a C toolchain
        # installed by default; the Linux runner is where races would
        # actually surface in concurrent tests, so single-platform race
        # coverage is sufficient.
        if: runner.os != 'Windows'
        run: go test -race ./... -count=1

      - name: go test (Windows)
        # Windows Go installs ship without a C toolchain (no MinGW) so
        # -race fails with "race requires cgo". Plain go test confirms
        # correctness on Windows; race-condition coverage rides on the
        # Linux runner. Adding cgo on Windows would mean installing
        # MinGW for no incremental coverage we don't already get.
        if: runner.os == 'Windows'
        run: go test ./... -count=1

  lint:
    # Lint findings don't depend on OS, so we run on a single runner
    # rather than the full matrix the `test` job uses. Configuration
    # lives in .golangci.yml at the repo root.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        # v9 of the action pulls a newer golangci-lint binary that's built
        # against Go 1.25+. v6 + version=latest resolved to v1.64.8 (built
        # against Go 1.24), which refused to lint a go.mod targeting 1.25
        # with "can't load config: the Go language version used to build
        # golangci-lint is lower than the targeted Go version."
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
          args: --timeout=5m
