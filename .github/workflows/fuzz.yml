name: Fuzz

# Runs every Fuzz* target for FUZZTIME minutes each. Two triggers:
#   - schedule  weekly cron so the fuzzer keeps finding new corpus
#               entries against drift
#   - workflow_dispatch  for the maintainer to run an ad-hoc deep
#                        session before a release
#
# Failing inputs land in testdata/fuzz/<target>/ and are uploaded as
# artifacts so the maintainer can fold them into the seed corpus.

on:
  schedule:
    - cron: '0 4 * * 0'   # Sundays 04:00 UTC
  workflow_dispatch:
    inputs:
      fuzztime:
        description: 'Per-target fuzz duration (e.g. 5m, 30m, 1h)'
        required: false
        default: '10m'

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Run fuzz targets
        run: |
          export FUZZTIME='${{ github.event.inputs.fuzztime || ''10m'' }}'
          make fuzz

      - name: Upload failing corpus entries on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-failures
          path: |
            **/testdata/fuzz/**
          retention-days: 30
