name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Configure git identity (Windows runner needs this)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main
        shell: bash

      - name: go vet
        run: go vet ./...

      - name: go build
        # Inject the git-derived version so `bosun --version` reports something
        # meaningful even on CI-built binaries. Mirrors `make build`. Falls
        # back to "dev" if git describe fails (shallow clones etc.).
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          go build -ldflags="-X main.version=$VERSION" -o bosun ./cmd/bosun
        shell: bash

      - name: go test -race
        run: go test -race ./... -count=1
