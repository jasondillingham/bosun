name: Stress

# Weekly stress + concurrency run with the race detector. Catches
# drift that the per-commit CI's quick race tests don't always
# surface — Stress|Concurrent|Serializ|NoTear|NoGoroutineLeak
# patterns sleep enough wall-clock to surface scheduler-dependent
# races that fire only under load.

on:
  schedule:
    - cron: '0 5 * * 0'   # Sundays 05:00 UTC, after fuzz finishes
  workflow_dispatch:

jobs:
  stress:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: Run stress tests
        run: make stress
