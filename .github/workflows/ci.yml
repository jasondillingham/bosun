name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Ubuntu-only by default. Public-repo Linux runners are free with
    # no minute counting; macOS (10× multiplier) and Windows (2×) burn
    # quota fast on a busy day. Cross-OS regressions are validated by
    # operator-side local runs (bosun is macOS-primary, Linux-tested,
    # Windows officially not-yet-supported in v0.10/v0.11).
    #
    # If/when this changes — external contributors arrive, Windows
    # support lands, etc. — re-add the matrix:
    #   os: [ubuntu-latest, macos-latest, windows-latest]
    #   runs-on: ${{ matrix.os }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: go vet
        run: go vet ./...

      - name: go build
        # Inject the git-derived version so `bosun --version` reports something
        # meaningful even on CI-built binaries. Mirrors `make build`. Falls
        # back to "dev" if git describe fails (shallow clones etc.).
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          go build -ldflags="-X main.version=$VERSION" -o bosun ./cmd/bosun

      - name: go test -race
        run: go test -race ./... -count=1

  lint:
    # Lint findings don't depend on OS, so we run on a single runner
    # rather than the full matrix the `test` job uses. Configuration
    # lives in .golangci.yml at the repo root.
    #
    # continue-on-error keeps the workflow green even when lint surfaces
    # findings — the codebase has 47 pre-existing issues that need
    # triage before we can require the job to pass. Triage is tracked
    # in TODO.md; remove this flag once the findings are zero or
    # explicitly suppressed in .golangci.yml.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        # v9 of the action pulls a newer golangci-lint binary that's built
        # against Go 1.25+. v6 + version=latest resolved to v1.64.8 (built
        # against Go 1.24), which refused to lint a go.mod targeting 1.25
        # with "can't load config: the Go language version used to build
        # golangci-lint is lower than the targeted Go version."
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
          args: --timeout=5m
